<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Paşazade Kahve Evi Menu</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; text-align: center; background-color: #fafafa; }
        .menu-header { background-color: #6f4e37; color: white; padding: 20px; }
        .category { margin: 20px; padding: 10px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { display: flex; justify-content: space-between; padding: 10px border-bottom: 1px solid #eee; }
        .price { font-weight: bold; color: #6f4e37; }
    </style>
</head>
<body>
    <div class="menu-header">
        <h1>Paşazade Kahve Evi</h1>
    </div>
    <div class="category">
        <h2>Kahveler</h2>
        <div class="item"><span>Türk Kahvesi</span> <span class="price">45 TL</span></div>
        <div class="item"><span>Latte</span> <span class="price">60 TL</span></div>
        <div class="item"><span>Americano</span> <span class="price">55 TL</span></div>
    </div>
    <div class="category">
        <h2>Tatlılar</h2>
        <div class="item"><span>Sultan Sarması</span> <span class="price">50 TL</span></div>
        <div class="item"><span>Ev Yapımı Kurabiye</span> <span class="price">35 TL</span></div>
    </div>
</body>
</html>
